<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login · SecureVault</title>
</head>
<body>
    <div class="container">

        <div class="brand">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <rect x="4" y="11" width="16" height="10" rx="2" stroke="#E8A33D" stroke-width="1.8"/>
                <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#E8A33D" stroke-width="1.8"/>
                <circle cx="12" cy="16" r="1.6" fill="#E8A33D"/>
            </svg>
        </div>

        <h2>SecureVault</h2>
        <p class="subtitle">Access your vault</p>

        <form method="POST">

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Master password" required>
            </div>

            <button type="submit">Unlock Vault</button>

        </form>

        <p class="footer-link">New here? <a href="/register">Create a vault</a></p>

    </div>
</body>
</html>
