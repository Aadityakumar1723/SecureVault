<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Register · SecureVault</title>
</head>
<body>
    <div class="container">

        <div class="brand">
            <div class="brand-glow">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                    <rect x="4" y="11" width="16" height="10" rx="2" stroke="#E8A33D" stroke-width="1.8"/>
                    <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#E8A33D" stroke-width="1.8"/>
                    <circle cx="12" cy="16" r="1.6" fill="#E8A33D"/>
                </svg>
            </div>
        </div>

        <h2>Create Your Vault</h2>
        <p class="subtitle">Set up a new SecureVault account</p>

        <form method="POST">

            <div class="field">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#E7E9EC" stroke-width="1.8"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#E7E9EC" stroke-width="1.8"><path d="M3 6l9 7 9-7"/><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="field">
                <label for="password">Master Password</label>
                <div class="input-wrap">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#E7E9EC" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/></svg>
                    <input type="password" id="password" name="password" placeholder="Choose a strong password" required>
                </div>
            </div>

            <button type="submit">Create Vault</button>

        </form>

        <p class="footer-link">Already have an account? <a href="/login">Sign in</a></p>

    </div>
</body>
</html>
