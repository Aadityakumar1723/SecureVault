<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Add Password · SecureVault</title>
</head>
<body>
    <div class="container">

        <h2>Add Credential</h2>
        <p class="subtitle">Store a new website login in your vault</p>

        <form method="POST">

            <div class="field">
                <label for="website">Website</label>
                <div class="input-wrap">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#E7E9EC" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
                    <input type="text" id="website" name="website" placeholder="e.g. github.com" required>
                </div>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#E7E9EC" stroke-width="1.8"><path d="M3 6l9 7 9-7"/><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg>
                    <input type="email" id="email" name="email" placeholder="Account email" required>
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#E7E9EC" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/></svg>
                    <input type="text" id="password" name="password" placeholder="Account password" required>
                </div>
            </div>

            <button type="submit">Save to Vault</button>

        </form>

        <p class="footer-link"><a href="/dashboard">&larr; Back to vault</a></p>

    </div>
</body>
</html>
